<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Music Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎵 Mood Music Finder</h1>
        <p>今の気分を教えてください（例：最高にハッピー、失恋して悲しい、仕事で疲れた）</p>
        
        <div class="input-area">
            <textarea id="moodInput" placeholder="ここに今の気持ちを入力..."></textarea>
            <button id="searchBtn">おすすめの曲を探す</button>
        </div>

        <div id="resultArea" class="result-area hidden">
            <h2>🎧 あなたにおすすめの曲</h2>
            <div id="playerContainer"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
